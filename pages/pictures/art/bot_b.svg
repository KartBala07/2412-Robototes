<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 460" role="img" aria-label="Stylized robot with articulated arm">
  <rect width="600" height="460" fill="#120d0e"/>
  <g opacity=".07" stroke="#ee2f38"><path d="M0 40h600M0 120h600M0 200h600M0 280h600M0 360h600M60 0v460M180 0v460M300 0v460M420 0v460M540 0v460" fill="none"/></g>
  <line x1="60" y1="380" x2="540" y2="380" stroke="#3a2c2e" stroke-width="3"/>
